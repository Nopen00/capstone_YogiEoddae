<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>장소 추출 | 요기어따?</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">

  <header class="bg-white border-b border-gray-200 px-6 py-4 flex items-center gap-4">
    <a href="/" class="text-gray-400 hover:text-gray-600 text-sm">← 홈</a>
    <h1 class="text-xl font-bold text-gray-800">🎬 YouTube 장소 추출</h1>
  </header>

  <main class="max-w-2xl mx-auto px-6 py-10">

    {% if error %}
    <div class="bg-red-50 border border-red-300 text-red-700 rounded-xl px-5 py-4 mb-6">
      <strong>오류:</strong> {{ error }}
    </div>
    {% endif %}

    <div class="bg-white rounded-2xl border border-gray-200 p-8">
      <form method="POST" id="extractForm">
        {% csrf_token %}

        <div class="space-y-5">

          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">YouTube URL <span class="text-red-500">*</span></label>
            <input type="url" name="url" required placeholder="https://www.youtube.com/watch?v=..."
              value="{{ form.url|default:'' }}"
              class="w-full border border-gray-300 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400">
          </div>

          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">미디어 제목 <span class="text-red-500">*</span></label>
            <input type="text" name="media_title" required placeholder="예: 이태원 클라쓰"
              value="{{ form.media_title|default:'' }}"
              class="w-full border border-gray-300 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400">
          </div>

          <div class="grid grid-cols-2 gap-4">
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">미디어 유형</label>
              <select name="media_type" class="w-full border border-gray-300 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400">
                <option value="youtube" {% if form.media_type == 'youtube' or not form %}selected{% endif %}>유튜브</option>
                <option value="drama"   {% if form.media_type == 'drama' %}selected{% endif %}>드라마</option>
                <option value="movie"   {% if form.media_type == 'movie' %}selected{% endif %}>영화</option>
                <option value="etc"     {% if form.media_type == 'etc' %}selected{% endif %}>기타</option>
              </select>
            </div>

            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">AI 선택</label>
              <select name="ai_choice" class="w-full border border-gray-300 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400">
                <option value="gemini" {% if form.ai_choice != 'claude' %}selected{% endif %}>Gemini 2.5 Flash</option>
                <option value="claude" {% if form.ai_choice == 'claude' %}selected{% endif %}>Claude (API 키 필요)</option>
              </select>
            </div>
          </div>

          <div class="grid grid-cols-2 gap-4">
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">영상 길이 (분)</label>
              <input type="number" name="duration_minutes" id="durationInput" min="1" placeholder="예: 25"
                value="{{ form.duration_minutes|default:'' }}"
                class="w-full border border-gray-300 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400">
              <p class="text-xs text-gray-400 mt-1">입력 시 최대 장소 수 자동 계산</p>
            </div>

            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">최대 장소 수</label>
              <input type="number" name="max_locations" id="maxLocInput" min="1" max="50"
                value="{{ form.max_locations|default:'10' }}"
                class="w-full border border-gray-300 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400">
              <p class="text-xs text-gray-400 mt-1">30분마다 10개 단위 자동 조정</p>
            </div>
          </div>

          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">장면 설명 <span class="text-gray-400">(선택)</span></label>
            <textarea name="scene" rows="2" placeholder="예: 주인공이 처음 이태원을 걷는 장면"
              class="w-full border border-gray-300 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400 resize-none">{{ form.scene|default:'' }}</textarea>
          </div>

        </div>

        <button type="submit" id="submitBtn"
          class="mt-8 w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded-xl transition-colors">
          장소 추출 시작
        </button>

        <!-- 로딩 상태 -->
        <div id="loadingMsg" class="hidden mt-4 text-center text-sm text-gray-500">
          <svg class="animate-spin inline-block w-5 h-5 mr-2 text-blue-500" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z"></path>
          </svg>
          YouTube 수집 → AI 추론 중입니다. 30초~1분 소요될 수 있습니다...
        </div>

      </form>
    </div>
  </main>

  <script>
    // 영상 길이 입력 시 최대 장소 수 자동 계산
    document.getElementById('durationInput').addEventListener('input', function () {
      const mins = parseInt(this.value) || 0;
      if (mins > 0) {
        document.getElementById('maxLocInput').value = (Math.floor(mins / 30) + 1) * 10;
      }
    });

    // 제출 시 로딩 표시
    document.getElementById('extractForm').addEventListener('submit', function () {
      document.getElementById('submitBtn').disabled = true;
      document.getElementById('submitBtn').textContent = '처리 중...';
      document.getElementById('loadingMsg').classList.remove('hidden');
    });
  </script>

</body>
</html>
