<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>장소 데이터 지도 검증</title>
<script type="text/javascript" src="https://oapi.map.naver.com/openapi/v3/maps.js?ncpClientId={{ naver_client_id }}"></script>
    <style>
        #map { width: 100%; height: 600px; }
    </style>
</head>
<body>
    <h1>우리 DB 장소 마커 테스트</h1>
    <div id="map"></div>

    <script>
        // 1. 지도 초기화 (첫 번째 장소 기준으로 중심 설정)
        var mapOptions = {
            center: new naver.maps.LatLng(37.5665, 126.9780), // 서울 기본값
            zoom: 10
        };
        var map = new naver.maps.Map('map', mapOptions);

        // 2. 장고에서 보낸 장소 데이터를 반복하며 마커 찍기
        {% for place in places %}
            new naver.maps.Marker({
                position: new naver.maps.LatLng({{ place.latitude }}, {{ place.longitude }}),
                map: map,
                title: "{{ place.name }}"
            });
        {% endfor %}
    </script>
</body>
</html>
