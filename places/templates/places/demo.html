<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>YogiEoddae — API 데모</title>
  <!-- Kakao Maps SDK는 바닥 스크립트에서 동적 로드 -->
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex; flex-direction: column; height: 100vh; background: #f0f2f5;
    }

    header {
      background: #1a1a2e; color: #fff;
      padding: 12px 20px;
      display: flex; align-items: center; gap: 12px; flex-shrink: 0;
    }
    header h1 { font-size: 1.1rem; font-weight: 700; }

    /* 지도 전환 탭 */
    .map-tabs { display: flex; gap: 6px; margin-left: auto; }
    .map-tab {
      padding: 5px 14px; border-radius: 16px; font-size: 0.78rem; font-weight: 600;
      cursor: pointer; border: 1px solid rgba(255,255,255,0.25); color: rgba(255,255,255,0.6);
      background: transparent; transition: all 0.15s;
    }
    .map-tab:hover  { background: rgba(255,255,255,0.1); color: #fff; }
    .map-tab.active { background: #4f6ef7; border-color: #4f6ef7; color: #fff; }

    /* 상태 뱃지 */
    #map-badge {
      font-size: 0.72rem; padding: 3px 10px; border-radius: 12px;
      background: rgba(255,255,255,0.08); color: #aaa;
    }
    #map-badge.ok  { background: #10b98133; color: #6ee7b7; }
    #map-badge.err { background: #ef444433; color: #fca5a5; }
    #map-badge.loading { background: #f59e0b33; color: #fcd34d; }

    main { display: flex; flex: 1; overflow: hidden; }

    /* ── 사이드바 ── */
    aside {
      width: 290px; background: #fff;
      border-right: 1px solid #e0e0e0;
      display: flex; flex-direction: column; flex-shrink: 0;
    }
    .sidebar-title {
      padding: 12px 16px; font-size: 0.82rem; font-weight: 600; color: #555;
      border-bottom: 1px solid #eee; background: #fafafa;
    }
    .media-list { overflow-y: auto; flex: 1; }
    .media-card {
      padding: 12px 16px; cursor: pointer;
      border-bottom: 1px solid #f0f0f0; transition: background 0.12s;
    }
    .media-card:hover  { background: #f5f7ff; }
    .media-card.active { background: #eef2ff; border-left: 3px solid #4f6ef7; }
    .media-card .title { font-size: 0.92rem; font-weight: 600; color: #1a1a2e; margin-bottom: 4px; }
    .media-card .meta  { font-size: 0.76rem; color: #888; display: flex; gap: 8px; align-items: center; }
    .place-count {
      font-size: 0.7rem; background: #4f6ef7; color: #fff;
      border-radius: 10px; padding: 1px 7px; margin-left: auto;
    }
    .badge { display: inline-block; padding: 2px 7px; border-radius: 10px; font-size: 0.7rem; font-weight: 600; }
    .badge-drama   { background: #dbeafe; color: #1d4ed8; }
    .badge-movie   { background: #fce7f3; color: #be185d; }
    .badge-youtube { background: #fee2e2; color: #dc2626; }
    .badge-etc     { background: #f3f4f6; color: #6b7280; }

    /* ── 콘텐츠 영역 ── */
    .content-area { flex: 1; display: flex; flex-direction: column; position: relative; overflow: hidden; }

    /* 지도 */
    #map { flex: 1; min-height: 0; }

    /* 목록 카드 (지도 실패 시 폴백) */
    #card-view {
      display: none; flex: 1; overflow-y: auto;
      padding: 20px; gap: 12px; flex-wrap: wrap; align-content: flex-start;
    }
    .place-card {
      background: #fff; border-radius: 10px; padding: 16px;
      width: calc(50% - 6px);
      box-shadow: 0 1px 4px rgba(0,0,0,0.08); border-left: 4px solid #4f6ef7;
    }
    .place-card .p-name    { font-size: 0.92rem; font-weight: 700; color: #1a1a2e; margin-bottom: 5px; }
    .place-card .p-scene   { font-size: 0.82rem; color: #4f6ef7; margin-bottom: 3px; }
    .place-card .p-address { font-size: 0.78rem; color: #888; }
    .place-card .p-conf    { font-size: 0.74rem; color: #10b981; margin-top: 5px; }
    .card-empty { color: #bbb; text-align: center; width: 100%; padding: 60px 0; font-size: 0.88rem; }

    /* 로딩 */
    #loading {
      display: none; position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0,0,0,0.65); color: #fff;
      padding: 10px 20px; border-radius: 8px; font-size: 0.85rem; z-index: 999;
    }

    /* 하단 패널 */
    #info-panel {
      background: #fff; border-top: 1px solid #e0e0e0;
      padding: 12px 20px; min-height: 76px; max-height: 150px;
      overflow-y: auto; flex-shrink: 0;
    }
    .placeholder { color: #aaa; font-size: 0.86rem; text-align: center; padding-top: 10px; }
    .place-info .p-name    { font-size: 0.98rem; font-weight: 700; color: #1a1a2e; margin-bottom: 4px; }
    .place-info .p-scene   { font-size: 0.83rem; color: #555; margin-bottom: 3px; }
    .place-info .p-address { font-size: 0.78rem; color: #888; }
    .place-info .p-conf    { font-size: 0.76rem; color: #10b981; margin-top: 4px; }

    /* 카카오 마커 */
    .k-label {
      background: #4f6ef7; color: #fff;
      padding: 5px 11px; border-radius: 14px;
      font-size: 12px; font-weight: 600; white-space: nowrap;
      box-shadow: 0 2px 6px rgba(0,0,0,0.25);
      cursor: pointer;
    }
    .k-label:hover { background: #3b55d4; }
  </style>
</head>
<body>

<header>
  <h1>YogiEoddae</h1>
  <span id="map-badge" class="loading">초기화 중...</span>
  <div class="map-tabs">
    <button class="map-tab active" onclick="switchMap('kakao')">카카오 지도</button>
    <button class="map-tab"       onclick="switchMap('naver')">네이버 지도</button>
  </div>
</header>

<main>
  <aside>
    <div class="sidebar-title">미디어 목록 ({{ media_list|length }}개)</div>
    <div class="media-list">
      {% for media in media_list %}
      <div class="media-card" data-id="{{ media.id }}" onclick="selectMedia(this)">
        <div class="title">
          {{ media.title }}
          <span class="place-count" id="count-{{ media.id }}">-</span>
        </div>
        <div class="meta">
          <span class="badge badge-{{ media.media_type }}">{{ media.get_media_type_display }}</span>
          {% if media.year %}<span>{{ media.year }}</span>{% endif %}
        </div>
      </div>
      {% endfor %}
    </div>
  </aside>

  <div class="content-area">
    <div id="map"></div>
    <div id="card-view"><div class="card-empty" id="card-empty">미디어를 선택하세요.</div></div>
    <div id="loading">불러오는 중...</div>
    <div id="info-panel"><div class="placeholder">왼쪽에서 미디어를 선택하면 촬영지가 표시됩니다.</div></div>
  </div>
</main>

<script>
  /* ── 전역 상태 ─────────────────────────────────── */
  var currentMode = 'kakao';   // 'kakao' | 'naver'
  var kakaoMap    = null;
  var naverMap    = null;
  var kakaoReady  = false;
  var naverReady  = false;
  var kakaoOverlays = [];
  var naverMarkers  = [];
  var activeCard  = null;
  var lastPlaces  = [];
  var lastMediaId = null;

  /* ── 카카오 지도 초기화 ────────────────────────── */
  function initKakao() {
    if (typeof kakao === 'undefined') {
      setBadge('err', '카카오 키 오류 — 새 키 필요');
      return;
    }
    kakao.maps.load(function() {
      kakaoMap = new kakao.maps.Map(document.getElementById('map'), {
        center: new kakao.maps.LatLng(36.5, 127.8),
        level: 12,
      });
      kakaoReady = true;
      setBadge('ok', '카카오 지도');
    });
  }

  /* ── 네이버 지도 동적 로드 ─────────────────────── */
  var NAVER_SOURCES = [
    'https://oapi.map.naver.com/openapi/v3/maps.js?ncpClientId={{ naver_client_id }}',
    'https://openapi.map.naver.com/openapi/v3/maps.js?ncpClientId={{ naver_client_id }}',
  ];
  var naverSrcIdx = 0;

  function loadNaver() {
    if (naverSrcIdx >= NAVER_SOURCES.length) { onNaverFailed(); return; }
    setBadge('loading', '네이버 로드 중 (' + (naverSrcIdx + 1) + '/' + NAVER_SOURCES.length + ')...');

    var s = document.createElement('script');
    s.src = NAVER_SOURCES[naverSrcIdx];
    s.onload = function() {
      try {
        naverMap = new naver.maps.Map('map', {
          center: new naver.maps.LatLng(36.5, 127.8), zoom: 7,
        });
        setTimeout(function() {
          if (document.querySelector('#map canvas')) {
            naverReady = true;
            setBadge('ok', '네이버 지도');
            if (lastPlaces.length > 0) drawNaverMarkers(lastPlaces, lastMediaId);
          } else {
            naverSrcIdx++;
            if (naverMap) { naverMap = null; document.getElementById('map').innerHTML = ''; }
            loadNaver();
          }
        }, 2500);
      } catch(e) { naverSrcIdx++; loadNaver(); }
    };
    s.onerror = function() { naverSrcIdx++; loadNaver(); };
    document.body.appendChild(s);
  }

  function onNaverFailed() {
    setBadge('err', '네이버 인증 실패 — 목록 모드');
    document.getElementById('map').style.display = 'none';
    document.getElementById('card-view').style.display = 'flex';
    document.getElementById('info-panel').style.display = 'none';
    if (lastPlaces.length > 0) drawCards(lastPlaces, lastMediaId);
  }

  /* ── 탭 전환 ───────────────────────────────────── */
  function switchMap(mode) {
    if (mode === currentMode) return;
    currentMode = mode;

    // 탭 스타일
    document.querySelectorAll('.map-tab').forEach(function(t, i) {
      t.classList.toggle('active', (i === 0 && mode === 'kakao') || (i === 1 && mode === 'naver'));
    });

    // 이전 오버레이/마커 정리
    clearKakaoOverlays();
    clearNaverMarkers();
    lastPlaces = [];

    if (mode === 'kakao') {
      // 카드뷰 숨기고 지도 복원
      document.getElementById('card-view').style.display = 'none';
      document.getElementById('map').style.display = 'block';
      document.getElementById('info-panel').style.display = 'block';
      if (!kakaoReady) initKakao();
      else setBadge('ok', '카카오 지도');
    } else {
      document.getElementById('info-panel').style.display = 'block';
      if (!naverReady && naverSrcIdx === 0) loadNaver();
      else if (naverReady) setBadge('ok', '네이버 지도');
    }

    setInfoPanel('미디어를 선택하면 촬영지가 표시됩니다.');
    if (activeCard) { activeCard.classList.remove('active'); activeCard = null; }
  }

  /* ── 미디어 선택 ───────────────────────────────── */
  function selectMedia(card) {
    if (activeCard) activeCard.classList.remove('active');
    card.classList.add('active');
    activeCard = card;
    fetchPlaces(card.dataset.id);
  }

  function fetchPlaces(mediaId) {
    document.getElementById('loading').style.display = 'block';
    clearKakaoOverlays();
    clearNaverMarkers();
    lastMediaId = mediaId;

    fetch('/api/places/map/?media_id=' + mediaId)
      .then(function(r) { return r.json(); })
      .then(function(data) {
        document.getElementById('loading').style.display = 'none';
        lastPlaces = data;

        var el = document.getElementById('count-' + mediaId);
        if (el) el.textContent = data.length + '개';

        if (data.length === 0) { setInfoPanel('연결된 촬영지가 없습니다.'); return; }

        if (currentMode === 'kakao' && kakaoReady) drawKakaoOverlays(data, mediaId);
        else if (currentMode === 'naver' && naverReady) drawNaverMarkers(data, mediaId);
        else if (currentMode === 'naver' && !naverReady) drawCards(data, mediaId);
        else setInfoPanel('지도 로드 중입니다. 잠시 후 다시 선택해 주세요.');
      })
      .catch(function(err) {
        document.getElementById('loading').style.display = 'none';
        setInfoPanel('API 오류: ' + err.message);
      });
  }

  /* ── 카카오 마커 ───────────────────────────────── */
  function drawKakaoOverlays(places, mediaId) {
    var bounds = new kakao.maps.LatLngBounds();
    places.forEach(function(place) {
      var pos = new kakao.maps.LatLng(parseFloat(place.latitude), parseFloat(place.longitude));
      bounds.extend(pos);
      var mi = getMediaInfo(place, mediaId);

      var el = document.createElement('div');
      el.className = 'k-label';
      el.textContent = place.name;
      el.onclick = function() { showDetail(place, mi); };

      var ov = new kakao.maps.CustomOverlay({ position: pos, content: el, yAnchor: 1 });
      ov.setMap(kakaoMap);
      kakaoOverlays.push(ov);
    });
    kakaoMap.setBounds(bounds);
    setInfoPanel('마커를 클릭하면 장소 정보가 표시됩니다.');
  }

  function clearKakaoOverlays() {
    kakaoOverlays.forEach(function(o) { o.setMap(null); });
    kakaoOverlays = [];
  }

  /* ── 네이버 마커 ───────────────────────────────── */
  function drawNaverMarkers(places, mediaId) {
    var bounds = new naver.maps.LatLngBounds();
    places.forEach(function(place) {
      var pos = new naver.maps.LatLng(parseFloat(place.latitude), parseFloat(place.longitude));
      bounds.extend(pos);
      var mi = getMediaInfo(place, mediaId);

      var m = new naver.maps.Marker({
        position: pos, map: naverMap, title: place.name,
        icon: {
          content: '<div style="background:#4f6ef7;color:#fff;padding:5px 11px;border-radius:14px;font-size:12px;font-weight:600;white-space:nowrap;box-shadow:0 2px 6px rgba(0,0,0,.25);cursor:pointer">' + place.name + '</div>',
          anchor: new naver.maps.Point(0, 10),
        }
      });
      m.addListener('click', function() { showDetail(place, mi); });
      naverMarkers.push(m);
    });
    naverMap.fitBounds(bounds, { top: 60, right: 60, bottom: 60, left: 60 });
    setInfoPanel('마커를 클릭하면 장소 정보가 표시됩니다.');
  }

  function clearNaverMarkers() {
    naverMarkers.forEach(function(m) { m.setMap(null); });
    naverMarkers = [];
  }

  /* ── 카드 뷰 (네이버 실패 폴백) ────────────────── */
  function drawCards(places, mediaId) {
    var section = document.getElementById('card-view');
    section.querySelectorAll('.place-card').forEach(function(el) { el.remove(); });
    document.getElementById('card-empty').style.display = places.length ? 'none' : 'block';

    places.forEach(function(place) {
      var mi = getMediaInfo(place, mediaId);
      var card = document.createElement('div');
      card.className = 'place-card';
      card.innerHTML = [
        '<div class="p-name">' + place.name + '</div>',
        mi.scene_description ? '<div class="p-scene">🎬 ' + mi.scene_description + '</div>' : '',
        '<div class="p-address">📍 ' + (place.address || '주소 미확인') + '</div>',
        mi.confidence_score ? '<div class="p-conf">✓ ' + Math.round(mi.confidence_score * 100) + '% 확신도</div>' : '',
      ].join('');
      section.appendChild(card);
    });
  }

  /* ── 공통 헬퍼 ─────────────────────────────────── */
  function getMediaInfo(place, mediaId) {
    return (place.media || []).find(function(m) {
      return String(m.media_id) === String(mediaId);
    }) || {};
  }

  function showDetail(place, mi) {
    document.getElementById('info-panel').innerHTML = [
      '<div class="place-info">',
      '<div class="p-name">' + place.name + '</div>',
      mi.scene_description ? '<div class="p-scene">🎬 ' + mi.scene_description + '</div>' : '',
      '<div class="p-address">📍 ' + (place.address || '주소 미확인') + '</div>',
      mi.confidence_score ? '<div class="p-conf">✓ ' + Math.round(mi.confidence_score * 100) + '% 확신도</div>' : '',
      '</div>',
    ].join('');
  }

  function setInfoPanel(msg) {
    document.getElementById('info-panel').innerHTML = '<div class="placeholder">' + msg + '</div>';
  }

  function setBadge(type, text) {
    var el = document.getElementById('map-badge');
    el.className = type; el.textContent = text;
  }

  /* ── 사이드바 카운트 미리 로드 ──────────────────── */
  document.querySelectorAll('.media-card').forEach(function(card) {
    fetch('/api/places/map/?media_id=' + card.dataset.id)
      .then(function(r) { return r.json(); })
      .then(function(data) {
        var el = document.getElementById('count-' + card.dataset.id);
        if (el) el.textContent = data.length + '개';
      });
  });

  /* ── 시작: 카카오 SDK 동적 로드 후 초기화 ─────── */
  (function() {
    var s = document.createElement('script');
    s.src = 'https://dapi.kakao.com/v2/maps/sdk.js?appkey={{ kakao_js_key }}&autoload=false';
    console.log('[Kakao] 실제 요청 URL:', s.src);
    s.onload = function() {
      console.log('[Kakao] SDK onload, window.kakao:', typeof window.kakao);
      initKakao();
    };
    s.onerror = function() {
      console.error('[Kakao] SDK 스크립트 로드 실패');
      setBadge('err', '카카오 SDK 로드 실패');
    };
    document.head.appendChild(s);
  })();
</script>

</body>
</html>
